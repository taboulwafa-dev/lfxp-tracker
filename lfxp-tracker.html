<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK1 Landfill Expansion — Action Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
:root{
  --bg:#ffffff;--bg2:#f8fafc;--bg3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --blue:#1d4ed8;--blue-dark:#1e3a8a;--blue-bg:#eff6ff;--blue-mid:#dbeafe;
  --red:#b91c1c;--red-bg:#fef2f2;--red-mid:#fee2e2;
  --green:#15803d;--green-bg:#f0fdf4;--green-mid:#dcfce7;
  --orange-bg:#fffbeb;--orange-text:#92400e;
  --purple-bg:#f5f3ff;--purple-text:#5b21b6;
  --amber:#d97706;--amber-bg:#fffbeb;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
}
body{background:linear-gradient(135deg,#e8f0fe 0%,#f1f5f9 50%,#e8f0fe 100%);min-height:100vh;padding:20px}
.app{max-width:1180px;margin:0 auto;border:1px solid var(--border);border-radius:var(--radius-xl);background:var(--bg);box-shadow:var(--shadow-md);overflow:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 60%,#2563eb 100%);padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.01em}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px;font-weight:400;letter-spacing:.01em}
.sync-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);display:inline-block;margin-right:5px;transition:background .3s}
.sync-dot.live{background:#4ade80}
.sync-dot.syncing{background:#fbbf24}
.sync-dot.error{background:#f87171}
.sync-status{font-size:11px;color:rgba(255,255,255,.75);display:flex;align-items:center}

/* IDENTITY BAR */
.identity-bar{padding:8px 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:var(--bg2)}
.id-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.id-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500}
.id-btn:hover{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.id-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 4px rgba(29,78,216,.3)}

/* SAVE BAR */
.save-bar{font-size:11px;color:var(--text3);padding:4px 1.5rem;text-align:right;border-bottom:1px solid var(--border);background:var(--bg2)}

/* NOTIFICATION */
.notif{display:none;align-items:center;gap:8px;padding:8px 1.5rem;background:var(--green-bg);border-bottom:1px solid var(--green-mid);font-size:13px;color:var(--green)}
.notif.show{display:flex}

/* TABS */
.tab-bar{display:flex;border-bottom:2px solid var(--border);background:var(--bg2);padding:0 .5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.tab-bar::-webkit-scrollbar{display:none}
.tab{font-size:12px;padding:.65rem .85rem;cursor:pointer;color:var(--text2);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;font-weight:500;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text);background:var(--bg3);border-radius:6px 6px 0 0}
.tab.active{color:var(--blue);font-weight:700;border-bottom:3px solid var(--blue);background:var(--bg)}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg2)}
.scard{background:#fff;border-radius:12px;padding:.85rem 1rem;text-align:center;border:1.5px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:all .15s}.scard:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
.scard-n{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.scard-l{font-size:11px;color:var(--text2);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.scard.crit .scard-n{color:var(--red)}
.scard.open .scard-n{color:var(--blue)}
.scard.done .scard-n{color:var(--green)}
.view-bar{padding:8px 1.5rem;display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.view-lbl{font-size:12px;color:var(--text2);flex-shrink:0}
.view-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500}
.view-btn:hover{background:var(--bg3)}
.view-btn.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 4px rgba(29,78,216,.2)}
.filters{padding:8px 1.5rem;display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.flt-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500}
.flt-btn:hover{background:var(--bg3)}
.flt-btn.on{border-color:var(--blue-dark);color:var(--blue-dark);background:var(--blue-bg);font-weight:600}
.tasks{padding:1rem 1.5rem;display:flex;flex-direction:column;gap:8px}
.sec-lbl{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;padding:6px 0 2px;text-transform:uppercase}
.task{border:1.5px solid #e2e8f0;border-radius:12px;background:#fff;overflow:hidden;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.task:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:#94a3b8}
.task.critical{border-left:4px solid #b91c1c;border-color:#fca5a5}
.task.closed{opacity:.5}
.task-hdr{display:flex;align-items:flex-start;gap:10px;padding:.8rem 1rem .65rem;cursor:pointer}
.ttag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:var(--radius);white-space:nowrap;flex-shrink:0;margin-top:1px}
.tag-crit{background:var(--red-bg);color:var(--red)}
.tag-open{background:var(--blue-bg);color:var(--blue)}
.tag-closed{background:var(--green-bg);color:var(--green)}
.task-meta{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.task-info{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.bdg{font-size:11px;padding:2px 7px;border-radius:var(--radius);background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.bdg.own{background:var(--purple-bg);color:var(--purple-text);border-color:transparent}
.bdg.due{background:var(--orange-bg);color:var(--orange-text);border-color:transparent}
.chev{font-size:16px;color:var(--text2);flex-shrink:0;transition:transform .2s;margin-top:2px}
.chev.open{transform:rotate(180deg)}
.task-body{border-top:1px solid var(--border);padding:.85rem 1rem;display:none}
.task-body.show{display:block}
.slbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.no-update{font-size:13px;color:var(--text2);background:#f8fafc;border-radius:8px;padding:8px 10px;line-height:1.5;margin-bottom:10px;font-style:italic;border:1px solid #e2e8f0}
.log-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.log-item{font-size:12px;color:var(--text2);padding:6px 10px;background:#f8fafc;border-radius:8px;line-height:1.5;border:1px solid #e2e8f0}
.log-item strong{color:var(--text);font-weight:500}
.inp{font-size:13px;padding:6px 8px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;width:100%;transition:box-shadow .15s}
.inp:focus{outline:none;box-shadow:0 0 0 2px rgba(24,95,165,.2);border-color:var(--blue)}
textarea.inp{resize:vertical;min-height:50px}
.action-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.btn:hover{background:var(--bg2)}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 4px rgba(29,78,216,.25)}
.btn.pri:hover{background:var(--blue-dark);box-shadow:0 3px 6px rgba(29,78,216,.35)}
.btn.red{background:var(--red);color:#fff;border-color:var(--red)}
.btn.red:hover{background:#791F1F}
.btn.del{color:var(--red);border-color:#F7C1C1}
.btn.del:hover{background:var(--red-bg)}
.panel{margin:0 1.5rem 1rem;border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.1rem;display:none;flex-direction:column;gap:8px;background:var(--bg2);box-shadow:inset 0 1px 3px rgba(0,0,0,.04)}
.panel.show{display:flex}
.frow{display:flex;gap:8px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.fg label{font-size:11px;color:var(--text2);font-weight:500}
.edit-box{background:#f8fafc;border-radius:10px;padding:.9rem;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;border:1.5px solid #dbeafe}
.divider{height:1px;background:var(--border);margin:8px 0}
.confirm-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fef2f2;border-radius:10px;margin-top:8px;flex-wrap:wrap;border:1.5px solid #fca5a5}
.confirm-bar span{color:var(--red);flex:1}
.no-tasks{text-align:center;padding:2rem;color:var(--text2)}
.proc-wrap{padding:1rem 1.5rem;overflow-x:auto}
.proc-info{font-size:12px;color:#1d4ed8;background:#eff6ff;border-radius:8px;padding:8px 12px;margin-bottom:10px;border:1px solid #bfdbfe}
.proc-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.psum{background:#fff;border-radius:12px;padding:.85rem 1rem;text-align:center;border:1.5px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .15s}.psum:hover{transform:translateY(-1px)}
.psum-n{font-size:20px;font-weight:600;color:var(--text)}
.psum-l{font-size:11px;color:var(--text2);margin-top:2px}
.psum.done .psum-n{color:var(--green)}
.psum.prog .psum-n{color:var(--blue)}
.ptbl{width:100%;border-collapse:collapse;min-width:580px}
.ptbl th{font-size:11px;font-weight:600;color:var(--text2);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap;background:var(--bg2);text-transform:uppercase;letter-spacing:.04em}
.ptbl td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tr:hover td{background:var(--bg2)}
.pcat td{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.05em;background:var(--bg3);padding:8px 8px 4px;text-transform:uppercase}
.sinp{font-size:12px;padding:4px 6px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;width:100%;min-width:70px;transition:box-shadow .15s}
.sinp:focus{outline:none;box-shadow:0 0 0 2px rgba(24,95,165,.2);border-color:var(--blue)}
.sbtn{font-size:11px;padding:3px 9px;border-radius:var(--radius);border:1px solid var(--blue);background:var(--blue);color:#fff;cursor:pointer;transition:background .15s}
.sbtn:hover{background:#0C447C}
.issues-wrap{padding:1rem 1.5rem;display:flex;flex-direction:column;gap:10px}
.issue-card{border:1.5px solid #e2e8f0;border-radius:12px;padding:.9rem 1rem;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:all .15s}.issue-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:#cbd5e1}
.issue-card:hover{box-shadow:0 1px 4px rgba(0,0,0,.06)}
.issue-card.crit{border-left:4px solid #b91c1c;border-color:#fca5a5}
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.pw-box{background:#fff;border-radius:16px;border:1.5px solid #e2e8f0;padding:1.75rem;width:300px;display:flex;flex-direction:column;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text2);gap:10px;flex-direction:column}
.spinner{width:28px;height:28px;border:3px solid var(--blue-mid);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){
  /* Layout */
  body{padding:6px}
  .app{border-radius:10px}
  .hdr{padding:.8rem 1rem;flex-direction:column;align-items:flex-start;gap:6px}
  .hdr-title{font-size:15px}
  .hdr-sub{font-size:10px}
  .identity-bar{padding:7px .75rem;gap:5px}
  .id-lbl{display:none}

  /* Summary cards - 2 columns */
  .summary{grid-template-columns:repeat(2,1fr);gap:8px;padding:.75rem 1rem}
  .scard{padding:.7rem .75rem}
  .scard-n{font-size:18px}
  .scard-l{font-size:10px}

  /* Proc summary */
  .proc-summary{grid-template-columns:repeat(3,1fr);gap:6px}
  .psum-n{font-size:17px}

  /* View bar */
  .view-bar{padding:6px .75rem;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;scrollbar-width:none}
  .view-bar::-webkit-scrollbar{display:none}
  .view-btn{flex-shrink:0;font-size:11px;padding:4px 9px}
  .view-lbl{display:none}

  /* Filters */
  .filters{padding:6px .75rem;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .flt-btn{flex-shrink:0;font-size:11px;padding:4px 9px}

  /* Tasks */
  .tasks{padding:.75rem 1rem;gap:8px}
  .task-hdr{padding:.7rem .85rem .6rem}
  .task-body{padding:.75rem .85rem}

  /* Proc table - horizontal scroll */
  .proc-wrap{padding:.75rem 1rem}
  .ptbl{min-width:580px}

  /* Issues */
  .issues-wrap{padding:.75rem 1rem}

  /* Progress content */
  #progress-content{padding:.75rem 1rem !important}

  /* Progress cards - stack on mobile */
  .prog-portion-grid{grid-template-columns:1fr !important}

  /* Buttons smaller */
  .btn{font-size:11px;padding:5px 10px}
  .btn.pri{font-size:11px}

  /* Header sync status */
  .sync-status{font-size:10px}

  /* Save bar */
  .save-bar{font-size:10px;padding:3px 1rem}
}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div>
      <div style="display:flex;align-items:center;gap:10px"><div style="width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🏗</div><div><div class="hdr-title">SK1 Landfill Expansion — Action Tracker</div><div class="hdr-sub">Contract 21056718 · KAK-LAMOR · South Kuwait Zone 1</div></div></div>
    </div>
    <button onclick="toggleVisitLog()" id="visit-btn" style="font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;display:none;align-items:center;gap:5px;margin-right:6px">
        <i class="ti ti-eye" style="font-size:14px"></i>
        <span style="font-size:11px">Visits</span>
      </button>
      <button onclick="toggleActivityPanel()" id="activity-btn" style="font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;margin-right:8px">
        <i class="ti ti-bell" style="font-size:14px"></i>
        <span id="activity-count" style="font-size:11px">Activity</span>
      </button>
      <div class="sync-status">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Connecting…</span></div><div style="display:none">
    </div>
  </div>

  <div class="identity-bar">
    <span class="id-lbl">Logged in as:</span>
    <button class="id-btn" onclick="trySetIdentity('PL')" id="id-PL">Tareq (PL)</button>
    <button class="id-btn" onclick="setIdentity('PM')" id="id-PM">Ayman (PM)</button>
    <button class="id-btn active" onclick="setIdentity('CM')" id="id-CM">Amin (CM)</button>
    <button class="id-btn" onclick="setIdentity('QC')" id="id-QC">Jobin (QC)</button>
    <button class="id-btn" onclick="setIdentity('CS')" id="id-CS">Elsayed (CS)</button>
    <button class="id-btn" onclick="setIdentity('CE')" id="id-CE">Aisha (CE)</button>
  </div>

  <div class="save-bar" id="save-bar">Connecting to server…</div>
  <div id="activity-panel" style="display:none;border-bottom:1px solid var(--border);background:var(--bg2)">
    <div style="padding:.6rem 1.5rem;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;font-weight:600;color:var(--text)">Recent Activity</span>
      <button onclick="toggleActivityPanel()" style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2)">Close ✕</button>
    </div>
    <div id="activity-feed" style="padding:0 1.5rem .75rem;max-height:280px;overflow-y:auto"></div>
  </div>
  <div id="visit-log-panel" style="display:none;border-bottom:1px solid var(--border);background:#fffbeb">
    <div style="padding:.6rem 1.5rem;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;font-weight:600;color:#92400e">👁 Who opened the app (Tareq only)</span>
      <button onclick="toggleVisitLog()" style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2)">Close ✕</button>
    </div>
    <div id="visit-log-list" style="padding:0 1.5rem .75rem;max-height:250px;overflow-y:auto"></div>
  </div>
  <div class="notif" id="notif"><i class="ti ti-check"></i><span id="notif-txt"></span></div>

  <div class="tab-bar">
    <div class="tab active" onclick="setTab('progress')" id="tab-progress">Progress Summary</div>
    <div class="tab" onclick="setTab('tasks')" id="tab-tasks">Action Items</div>
    <div class="tab" onclick="setTab('proc')" id="tab-proc">Procurement Status</div>
    <div class="tab" onclick="setTab('liner')" id="tab-liner">Liner System</div>
    <div class="tab" onclick="setTab('issues')" id="tab-issues">Issues of Concern</div>
  </div>

  <div id="pane-tasks" style="display:none">
    <div class="summary" id="summary"></div>
    <div class="view-bar">
      <span class="view-lbl">Viewing:</span>
      <button class="view-btn on" onclick="setView('mine')" id="v-mine">My tasks</button>
      <button class="view-btn" onclick="setView('all')" id="v-all">All tasks</button>
      <button class="view-btn" onclick="setView('CM')" id="v-CM">Amin (CM)</button>
      <button class="view-btn" onclick="setView('QC')" id="v-QC">Jobin (QC)</button>
      <button class="view-btn" onclick="setView('CS')" id="v-CS">Elsayed (CS)</button>
      <button class="view-btn" onclick="setView('CE')" id="v-CE">Aisha (CE)</button>
    </div>
    <div class="filters">
      <button class="flt-btn on" id="f-all" onclick="setFilter('all')">All</button>
      <button class="flt-btn" id="f-critical" onclick="setFilter('critical')">🔴 Critical</button>
      <button class="flt-btn" id="f-open" onclick="setFilter('open')">Open</button>
      <button class="flt-btn" id="f-closed" onclick="setFilter('closed')">Closed</button>
      <div style="flex:1"></div>
      <button class="btn" id="add-task-btn" onclick="togglePanel('add-panel')" style="display:none">
        <i class="ti ti-plus" style="font-size:13px;vertical-align:-1px;margin-right:3px"></i>Add task
      </button>
    </div>
    <div class="panel" id="add-panel">
      <div style="font-weight:500;color:var(--text)">New task</div>
      <div class="fg"><label>Description</label><textarea class="inp" id="new-title" placeholder="Describe the task…"></textarea></div>
      <div class="frow">
        <div class="fg"><label>Section</label><select class="inp" id="new-section">
          <option>Engineering</option><option>Construction</option><option>Procurement</option><option>Tests</option><option>Other</option>
        </select></div>
        <div class="fg"><label>Owner</label><select class="inp" id="new-owner">
          <option value="CM">Amin (CM)</option><option value="QC">Jobin (QC)</option>
          <option value="YH">Elsayed (CS)</option><option value="CE">Aisha (CE)</option>

// ════════════════════════════════════════════════════
// BACKEND
// ════════════════════════════════════════════════════
function setSyncStatus(state,msg){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  dot.className='sync-dot '+state;
  lbl.textContent=msg;
}
function setSaveBar(msg){const el=document.getElementById('save-bar');if(el)el.textContent=msg;}

async function serverGet(key){
  const url=SCRIPT_URL+'?key='+encodeURIComponent(key);
  const r=await fetch(url);
  const j=await r.json();
  return j.value||null;
}

async function serverSet(key,value){
  await fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({key,value})
  });
}

async function saveAll(){
  if(SCRIPT_URL==='PASTE_YOUR_SCRIPT_URL_HERE'){setSaveBar('⚠ Script URL not configured.');return;}
  setSyncStatus('syncing','Saving…');setSaveBar('Saving…');
  try{
    await Promise.all([
      serverSet('lfxp_tasks',JSON.stringify(TASKS)),
      serverSet('lfxp_proc',JSON.stringify(PROC)),
      serverSet('lfxp_issues',JSON.stringify(ISSUES)),
      serverSet('lfxp_meta',JSON.stringify({issueId,nextTaskId,logs,closed})),
    ]);
    setSyncStatus('live','Live');setSaveBar('Saved · '+nowLabel());
    lastHash=dataHash();
  }catch(e){setSyncStatus('error','Save failed');setSaveBar('Save failed — check connection.');}
}

async function loadAll(){
  if(SCRIPT_URL==='PASTE_YOUR_SCRIPT_URL_HERE'){
    loadDefaults();setSyncStatus('error','Script URL not set');setSaveBar('⚠ Open the file and paste your Script URL.');
    render();return;
  }
  setSyncStatus('syncing','Loading…');setSaveBar('Loading…');
  try{
    const[rt,rp,ri,rm]=await Promise.all([
      serverGet('lfxp_tasks'),serverGet('lfxp_proc'),
      serverGet('lfxp_issues'),serverGet('lfxp_meta'),
    ]);
    TASKS=rt?JSON.parse(rt):JSON.parse(JSON.stringify(DEFAULT_TASKS));
    PROC=rp?JSON.parse(rp):JSON.parse(JSON.stringify(DEFAULT_PROC));
    ISSUES=ri?JSON.parse(ri):[];
    if(rm){const m=JSON.parse(rm);issueId=m.issueId||1;nextTaskId=m.nextTaskId||200;logs=m.logs||{};closed=m.closed||{};}
    else{logs={};closed={};}
    initState();
    setSyncStatus('live','Live');setSaveBar('Loaded · '+nowLabel());
    lastHash=dataHash();
  }catch(e){
    loadDefaults();setSyncStatus('error','Offline — showing local data');setSaveBar('Connection failed.');
  }
  render();
  if(currentTab==='proc')renderProc();
  if(currentTab==='issues')renderIssues();
  renderProgress();
  loadActivity();
  loadVisitLog();
  startPolling();
}

function loadDefaults(){
  TASKS=JSON.parse(JSON.stringify(DEFAULT_TASKS));
  PROC=JSON.parse(JSON.stringify(DEFAULT_PROC));
  ISSUES=[];logs={};closed={};
  initState();
}

function initState(){
  TASKS.forEach(t=>{
    if(!logs[t.id])logs[t.id]=[];
    if(closed[t.id]===undefined)closed[t.id]=false;
    expanded[t.id]=expanded[t.id]||false;
    editing[t.id]=false;pendingDelete[t.id]=false;
  });
}

function dataHash(){
  return JSON.stringify({t:TASKS,p:PROC,i:ISSUES,l:logs,c:closed});
}

async function poll(){
  if(SCRIPT_URL==='PASTE_YOUR_SCRIPT_URL_HERE')return;
  try{
    const[rt,rp,ri,rm]=await Promise.all([
      serverGet('lfxp_tasks'),serverGet('lfxp_proc'),
      serverGet('lfxp_issues'),serverGet('lfxp_meta'),
    ]);
    const newTasks=rt?JSON.parse(rt):TASKS;
    const newProc=rp?JSON.parse(rp):PROC;
    const newIssues=ri?JSON.parse(ri):ISSUES;
    const newMeta=rm?JSON.parse(rm):{issueId,nextTaskId,logs,closed};
    const newHash=JSON.stringify({t:newTasks,p:newProc,i:newIssues,l:newMeta.logs,c:newMeta.closed});
    if(newHash!==lastHash){
      TASKS=newTasks;PROC=newProc;ISSUES=newIssues;
      issueId=newMeta.issueId||issueId;nextTaskId=newMeta.nextTaskId||nextTaskId;
      logs=newMeta.logs||logs;closed=newMeta.closed||closed;
      initState();lastHash=newHash;
      render();
      if(currentTab==='proc')renderProc();
      if(currentTab==='issues')renderIssues();
      setSaveBar('Updated · '+nowLabel());
      loadActivity();
      notify('Data refreshed — new updates from your team.');
    }
    setSyncStatus('live','Live');
  }catch(e){setSyncStatus('error','Connection issue');}
}

function startPolling(){
  if(pollInterval)clearInterval(pollInterval);
  pollInterval=setInterval(poll,30000); // every 30 seconds
}

function nowLabel(){
  const d=new Date();
  return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function isPL(){return identity==='PL';}
function isPM(){return identity==='PM';}
function canEditProc(){return identity==='PL'||identity==='CE';}
function isCompleted(p){return p.delivered>=p.boq;}
function remaining(p){return Math.max(0,p.boq-p.delivered);}

function setIdentity(r){
  identity=r;

  viewAs=v;

function setTab(t){
  currentTab=t;
  ['progress','tasks','proc','issues','liner'].forEach(x=>{
    const p=document.getElementById('pane-'+x);
    const tb=document.getElementById('tab-'+x);
    if(p)p.style.display=x===t?'block':'none';
    if(tb)tb.classList.toggle('active',x===t);
  });
  if(t==='tasks')render();
  else if(t==='proc')renderProc();
  else if(t==='issues')renderIssues();
  else if(t==='liner'){loadLinerData().then(()=>renderLiner());}
  else if(t==='progress')renderProgress();

function setFilter(f){
  filterMode=f;

function togglePanel(id){document.getElementById(id).classList.toggle('show');}
function notify(msg){

// ════════════════════════════════════════════════════
// TASKS
// ════════════════════════════════════════════════════
function tasksBelongTo(role){
  const owned=ownerMap[role];
  if(owned===null)return[...TASKS];
  return TASKS.filter(t=>owned.some(o=>t.owner===o||t.owner.includes(o)));
}
function visibleTasks(){
  let list;
  if(viewAs==='all')list=[...TASKS];
  else if(viewAs==='mine')list=tasksBelongTo(identity);
  else list=tasksBelongTo(viewAs);
  if(filterMode==='critical')list=list.filter(t=>t.critical&&!closed[t.id]);
  else if(filterMode==='open')list=list.filter(t=>!closed[t.id]);
  else if(filterMode==='closed')list=list.filter(t=>closed[t.id]);
  return list;
}
function addTask(){
  const title=document.getElementById('new-title').value.trim();if(!title)return;
  const ov=document.getElementById('new-owner').value;
  const t={id:nextTaskId++,section:document.getElementById('new-section').value,title,owner:ov,
    due:document.getElementById('new-due').value.trim()||'—',critical:document.getElementById('new-critical').value==='1'};
  TASKS.push(t);logs[t.id]=[];closed[t.id]=false;expanded[t.id]=false;editing[t.id]=false;pendingDelete[t.id]=false;
  document.getElementById('new-title').value='';document.getElementById('new-due').value='';
  document.getElementById('add-panel').classList.remove('show');
  logActivity(`added new task: "${title.slice(0,60)}" → ${olabel(ov)}`);
  notify('Task added — assigned to '+olabel(ov));saveAll();render();
}
function askDelete(id){Object.keys(pendingDelete).forEach(k=>pendingDelete[k]=false);pendingDelete[id]=true;render();}
function cancelDelete(id){pendingDelete[id]=false;render();}
function confirmDelete(id){
  TASKS=TASKS.filter(t=>t.id!==id);
  delete logs[id];delete closed[id];delete expanded[id];delete editing[id];delete pendingDelete[id];
  notify('Task removed.');saveAll();render();
}
function toggleEdit(id){editing[id]=!editing[id];pendingDelete[id]=false;render();}
function saveEdit(id){
  const t=TASKS.find(t=>t.id===id);if(!t)return;
  const nt=document.getElementById('et-'+id).value.trim();
  const no=document.getElementById('eo-'+id).value;
  const ns=document.getElementById('es-'+id).value;
  const nd=document.getElementById('ed-'+id).value.trim()||'—';
  const nc=document.getElementById('ec-'+id).value==='1';
  if(!nt)return;
  const ch=[];
  if(no!==t.owner)ch.push('Owner → '+olabel(no));
  if(ns!==t.section)ch.push('Section → '+ns);
  if(nd!==t.due)ch.push('Due → '+nd);
  if(nc!==t.critical)ch.push('Critical → '+(nc?'Yes':'No'));
  if(nt!==t.title)ch.push('Description updated');
  t.title=nt;t.owner=no;t.section=ns;t.due=nd;t.critical=nc;
  if(ch.length){logs[id].unshift({who:'Tareq (PL)',ts:now(),txt:'✏ '+ch.join(', ')});}
  editing[id]=false;notify('Task updated.');saveAll();render();
}

function canPostUpdate(t){
  if(isPL()) return true;
  // Check if current identity owns this task
  const owned = ownerMap[identity] || [];
  return owned.some(o => t.owner === o || t.owner.includes(o));
}
function submitUpdate(id){
  const el=document.getElementById('upd-'+id);
  const txt=el.value.trim();if(!txt)return;
  logs[id].unshift({who:roleNames[identity],ts:now(),txt});
  const t2=TASKS.find(t=>t.id===id);
  logActivity(`posted update on task: "${t2?t2.title.slice(0,50):''}"`);
  el.value='';notify('Update posted.');saveAll();render();
  setTimeout(()=>{expanded[id]=true;render();},30);
}

function submitPMComment(id){
  const el = document.getElementById('upd-'+id);
  const txt = el.value.trim(); if(!txt) return;
  logs[id].unshift({who:'Ayman (PM) 💬', ts:now(), txt, isPM:true});
  const tpm=TASKS.find(t=>t.id===id);
  logActivity(`added PM comment on: "${tpm?tpm.title.slice(0,50):''}"`);
  el.value=''; notify('PM comment added.'); saveAll(); render();
  setTimeout(()=>{expanded[id]=true;render();},30);
}
function closeTask(id){
  closed[id]=true;logs[id].unshift({who:'Tareq (PL)',ts:now(),txt:'✓ Task closed.'});
  const tc=TASKS.find(t=>t.id===id);
  logActivity(`closed task: "${tc?tc.title.slice(0,50):''}"`);
  notify('Task closed.');saveAll();render();
}
function reopenTask(id){
  closed[id]=false;logs[id].unshift({who:'Tareq (PL)',ts:now(),txt:'↩ Task reopened.'});

      ${statusBlock}${hasLogs&&latest?logHtml:''}

function liveUpdateRem(id, boq){
  const qi = document.getElementById('pq-'+id);
  if(!qi) return;
  const val = Math.min(Math.max(0, parseFloat(qi.value)||0), boq);
  const rem = Math.max(0, boq - val);
  const remEl = document.getElementById('rem-'+id);
  if(remEl){
    remEl.textContent = rem === 0 ? '0' : rem.toLocaleString();
    remEl.style.color = rem === 0 ? '#15803d' : '#b91c1c';
  }
}


function saveProc(id){
  const p=PROC.find(x=>x.id===id);if(!p)return;
  const di=document.getElementById('pd-'+id);
  const si=document.getElementById('ps-'+id);
  const qi=document.getElementById('pq-'+id);
  if(di) p.exp_date=fromInputDate(di.value);
  if(si) p.status=si.value;
  if(qi){const v=parseFloat(qi.value);if(!isNaN(v)&&v>=0)p.delivered=Math.min(v,p.boq);}
  const pp=PROC.find(x=>x.id===id);
  logActivity(`updated procurement: "${pp?pp.name:'item'}"`);
  notify('Row updated.');saveAll();renderProc();
}

function renderProc(){
  const pl=isPL(),editable=canEditProc();
  const total=PROC.length,done=PROC.filter(p=>isCompleted(p)).length,inprog=total-done;
  let html=`<div class="proc-summary">
    <div class="psum"><div class="psum-n">${total}</div><div class="psum-l">Total items</div></div>
    <div class="psum done"><div class="psum-n">${done}</div><div class="psum-l">Completed</div></div>
    <div class="psum prog"><div class="psum-n">${inprog}</div><div class="psum-l">In progress</div></div>
  </div>`;
  if(editable)html+=`<div class="proc-info"><i class="ti ti-pencil" style="font-size:12px;vertical-align:-1px;margin-right:4px"></i>${pl?'Edit delivered qty, expected delivery and status — Save per row.':'Edit expected delivery and status — Save per row.'}</div>`;
  const STATUS_OPTS=['Delivery InProgress','Delivered','Pending Payment','PO Issued','PO Released','Cheque Released','RAM Approval','RFQ Issued','RFQ InProgress','FAT Done','Under Inspection','Completed'];
  const cats=[...new Set(PROC.map(p=>p.cat))];
  const cols=editable?9:8;
  html+=`<table class="ptbl"><tr>
    <th style="width:15%">Material</th>
    <th style="width:5%">Unit</th>
    <th style="width:8%">BOQ qty</th>
    <th style="width:9%">Delivered</th>
    <th style="width:8%">Remaining</th>
    <th style="width:10%">Req. on site</th>
    <th style="width:11%">Exp. delivery</th>
    <th style="width:${editable?'15%':'22%'}">Status</th>
    ${editable?'<th style="width:7%"></th>':''}
  </tr>`;
  cats.forEach(cat=>{
    html+=`<tr class="pcat"><td colspan="${cols}">${cat}</td></tr>`;
    PROC.filter(p=>p.cat===cat).forEach(p=>{
      const comp=isCompleted(p),rem=remaining(p);
      const remCell=`<span id="rem-${p.id}" style="font-weight:600;color:${rem===0?'#15803d':'#b91c1c'}">${rem===0?'0':rem.toLocaleString()}</span>`;
      const deliveredCell=pl&&!comp?`<input class="sinp" id="pq-${p.id}" type="number" value="${p.delivered}" min="0" max="${p.boq}" style="width:64px" oninput="liveUpdateRem('${p.id}',${p.boq})">`:p.delivered.toLocaleString();
      const reqCell=`<span style="font-size:12px;color:var(--text2)">${p.req_date||'—'}</span>`;
      const expCell=editable&&!comp?`<input class="sinp" id="pd-${p.id}" type="date" value="${p.exp_date?toInputDate(p.exp_date):''}" style="min-width:110px">`:`<span style="font-size:12px;color:var(--text2)">${p.exp_date||'—'}</span>`;
      let statusCell;
      if(comp){statusCell=`<span style="color:#15803d;font-weight:600">✓ Completed</span>`;}
      else if(pl){statusCell=`<select class="sinp" id="ps-${p.id}">${STATUS_OPTS.map(s=>`<option value="${s}"${s===p.status?' selected':''}>${s}</option>`).join('')}</select>`;}
      else if(editable){const ce=STATUS_OPTS.filter(s=>s!=='Completed');statusCell=`<select class="sinp" id="ps-${p.id}">${ce.map(s=>`<option value="${s}"${s===p.status?' selected':''}>${s}</option>`).join('')}</select>`;}
      else{statusCell=`<span style="font-size:12px;color:var(--text2)">${p.status}</span>`;}
      html+=`<tr${comp?' style="opacity:.55"':''}>
        <td style="font-weight:500">${p.name}</td>
        <td style="color:var(--text2)">${p.unit}</td>
        <td>${p.boq.toLocaleString()}</td>
        <td>${deliveredCell}</td>
        <td>${remCell}</td>
        <td>${reqCell}</td>
        <td>${expCell}</td>
        <td>${statusCell}</td>
        ${editable?`<td>${comp?'':`<button class="sbtn" onclick="saveProc('${p.id}')">Save</button>`}</td>`:''}
      </tr>`;
    });
  });
  html+='</table>';
  document.getElementById('proc-content').innerHTML=html;
}

function toInputDate(d){
  try{
    const months={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
    const p=d.split('-');
    if(p.length!==3)return '';
    return `20${p[2]}-${months[p[1]]||'01'}-${p[0].padStart(2,'0')}`;
  }catch(e){return '';}
}

function fromInputDate(d){
  try{
    if(!d)return '';
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const p=d.split('-');
    if(p.length!==3)return d;
    return `${p[2]}-${months[parseInt(p[1])-1]}-${p[0].slice(2)}`;
  }catch(e){return d;}
}

function toggleIssueAdd(){showIssueAdd=!showIssueAdd;renderIssues();}
function addIssue(){
  const txt=document.getElementById('itxt').value.trim();if(!txt)return;
  const corr=document.getElementById('icorr').value.trim();
  ISSUES.unshift({id:issueId++,text:txt,corrective:corr,critical:document.getElementById('icit').value==='1',by:roleNames[identity],ts:now()});
  logActivity(`raised issue: "${txt.slice(0,60)}"`);
  showIssueAdd=false;notify('Issue added.');saveAll();renderIssues();
}
function askDeleteIssue(id){Object.keys(pendingIssueDelete).forEach(k=>pendingIssueDelete[k]=false);pendingIssueDelete[id]=true;renderIssues();}
function cancelDeleteIssue(id){pendingIssueDelete[id]=false;renderIssues();}
function confirmDeleteIssue(id){ISSUES=ISSUES.filter(i=>i.id!==id);notify('Issue deleted.');saveAll();renderIssues();}
function editIssue(id){
  if(!isPL()){notify('Only Tareq (PL) can edit issues.');return;}
  const issue=ISSUES.find(i=>i.id===id);if(!issue)return;
  const el=document.getElementById('issue-text-'+id);if(!el)return;
  el.innerHTML=`<textarea class="inp" id="iet-${id}" style="min-height:40px;margin-bottom:6px">${issue.text}</textarea>
  <div class="action-row" style="margin-top:0"><button class="btn pri" onclick="saveIssueEdit(${id})">Save</button><button class="btn" onclick="renderIssues()">Cancel</button></div>`;
}
function saveIssueEdit(id){
  const el=document.getElementById('iet-'+id);if(!el)return;
  const issue=ISSUES.find(i=>i.id===id);if(!issue)return;
  issue.text=el.value.trim()||issue.text;notify('Issue updated.');saveAll();renderIssues();
}
function renderIssues(){
  const pl=isPL(),pm=isPM();
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <span style="font-weight:600;color:var(--text);font-size:14px">Issues of concern</span>
    ${!pm?`<button class="btn" onclick="toggleIssueAdd()"><i class="ti ti-plus" style="font-size:13px;vertical-align:-1px;margin-right:3px"></i>Add issue</button>`:''}
  </div>
  ${!pm?`<div class="panel ${showIssueAdd?'show':''}" style="margin:0 0 10px">
    <div class="fg"><label>Describe the issue</label><textarea class="inp" id="itxt" placeholder="What's the concern?" style="min-height:60px"></textarea></div>
    <div class="frow"><div class="fg"><label>Priority</label><select class="inp" id="icit"><option value="0">Normal</option><option value="1">Critical 🔴</option></select></div></div>
    <div class="action-row" style="margin-top:0"><button class="btn pri" onclick="addIssue()">Submit</button><button class="btn" onclick="toggleIssueAdd()">Cancel</button></div>
  </div>`:''}`;
  if(!ISSUES.length){
    html+=`<div class="no-tasks">No issues raised yet.</div>`;
  }else{
    ISSUES.forEach(issue=>{
      const isDel=pendingIssueDelete[issue.id];
      html+=`<div class="issue-card ${issue.critical?'crit':''}">
        <div style="display:flex;align-items:flex-start;gap:8px">
          <div style="flex:1">
            ${issue.critical?'<span class="ttag tag-crit" style="display:inline-block;margin-bottom:5px">🔴 Critical</span><br>':''}
            <div id="issue-text-${issue.id}" style="color:var(--text);line-height:1.5">${issue.text}</div>
            ${issue.corrective?`<div style="margin-top:6px;padding:6px 10px;background:#f0fdf4;border-radius:8px;border-left:3px solid #16a34a"><div style="font-size:10px;font-weight:600;color:#15803d;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Corrective Action</div><div style="font-size:12px;color:#166534;line-height:1.5">${issue.corrective}</div></div>`:''}
            <div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap">
              <span class="bdg own"><i class="ti ti-user" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>${issue.by}</span>
              <span class="bdg"><i class="ti ti-clock" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>${issue.ts}</span>
            </div>
            ${isDel?`<div class="confirm-bar" style="margin-top:8px"><span>Delete this issue?</span><button class="btn red" onclick="confirmDeleteIssue(${issue.id})">Yes, delete</button><button class="btn" onclick="cancelDeleteIssue(${issue.id})">Cancel</button></div>`:''}
          </div>
          ${pl?`<div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn" style="padding:3px 8px" onclick="editIssue(${issue.id})"><i class="ti ti-edit" style="font-size:12px;vertical-align:-1px"></i></button>
            <button class="btn del" style="padding:3px 8px" onclick="askDeleteIssue(${issue.id})"><i class="ti ti-trash" style="font-size:12px;vertical-align:-1px"></i></button>
          </div>`:''}
        </div>
      </div>`;
    });
  }
  document.getElementById('issues-wrap').innerHTML=html;
}

function renderProgress(){

  setTimeout(()=>{
    renderProgActivities();
    renderSCurve('overall');
  },50);
}

function varBadge(v,sm){
  const bg=v<0?'#FCEBEB':v>0?'#EAF3DE':'var(--color-background-secondary)';
  const col=v<0?'#A32D2D':v>0?'#3B6D11':'var(--color-text-secondary)';
  const sz=sm?'10px':'11px';
  return `<span style="font-size:${sz};font-weight:500;padding:2px 7px;border-radius:var(--border-radius-md);background:${bg};color:${col};white-space:nowrap">${v>0?'+':''}${v}%</span>`;
}

function dualBar(plan,actual){
  return `
  <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
    <span style="font-size:10px;color:var(--color-text-secondary);width:40px;flex-shrink:0">Planned</span>
    <div style="flex:1;height:5px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.min(plan,100)}%;background:#185FA5;border-radius:3px;transition:width .4s"></div></div>
    <span style="font-size:10px;font-weight:500;color:#185FA5;width:32px;text-align:right">${plan}%</span>
  </div>
  <div style="display:flex;align-items:center;gap:5px">
    <span style="font-size:10px;color:var(--color-text-secondary);width:40px;flex-shrink:0">Actual</span>
    <div style="flex:1;height:5px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.min(actual,100)}%;background:#3B6D11;border-radius:3px;transition:width .4s"></div></div>
    <span style="font-size:10px;font-weight:500;color:#3B6D11;width:32px;text-align:right">${actual}%</span>
  </div>`;
}

function buildProgressHTML(){
  const d=PMS_DATA, ov=d.overall;
  const isOverall = progActivePortion===null;
  const is5a = progActivePortion==='5a';
  const is5b = progActivePortion==='5b';

  const overallCard=`
  <div onclick="selectPortion(null)" style="border:2px solid ${isOverall?'#185FA5':'#e2e8f0'};border-radius:12px;padding:1rem 1.1rem;cursor:pointer;background:${isOverall?'#eff6ff':'#fff'};box-shadow:${isOverall?'0 4px 12px rgba(29,78,216,.15)':'0 2px 8px rgba(0,0,0,.08)'};transition:all .2s">
    <div style="font-size:11px;font-weight:600;color:${isOverall?'#185FA5':'var(--color-text-secondary)'};text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Overall Project</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;text-align:center;margin-bottom:8px">
      <div><div style="font-size:18px;font-weight:600;color:#185FA5">${ov.plan}%</div><div style="font-size:10px;color:var(--color-text-secondary)">Planned</div></div>

    <div style="font-size:12px;color:var(--color-text-secondary)">Week ending: <strong style="color:var(--color-text-primary)">${PMS_WEEK}</strong> &nbsp;·&nbsp; PMS_LANDFILL_03-JUL-2026</div>
    <div style="display:flex;gap:10px;align-items:center;font-size:12px;color:var(--color-text-secondary)">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#185FA5;display:inline-block"></span>Planned</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#3B6D11;display:inline-block"></span>Actual</span>
    </div>
  </div>

  <!-- Top cards -->
  <div class="prog-portion-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
    ${overallCard}
    ${portionCard('5a',d.portion5a)}
    ${portionCard('5b',d.portion5b)}
  </div>

  <!-- Portion phase detail (shown when 5A or 5B selected) -->
  <div id="portion-detail" style="${progActivePortion?'':'display:none'}"></div>

  <!-- S-Curve -->
  <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:1rem;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.07)">
    <div style="font-size:12px;font-weight:600;color:var(--color-text-primary);margin-bottom:10px" id="scurve-lbl">S-Curve — Overall Project (Cumulative %)</div>
    <div style="position:relative;width:100%;height:200px"><canvas id="prog-scurve"></canvas></div>
  </div>

  <!-- Activities -->
  <div id="prog-acts-section"></div>`;
}

function selectPortion(key){
  progActivePortion=key;
  progPhaseOpen={};
  const d=document.getElementById('progress-content');
  if(d) d.innerHTML=buildProgressHTML();
  setTimeout(()=>{
    renderPortionDetail();
    renderProgActivities();
    const mode = key===null?'overall':key;
    renderSCurve(mode);
  },50);
}

function renderPortionDetail(){
  const el=document.getElementById('portion-detail');
  if(!el||!progActivePortion)return;
  const p=PMS_DATA[`portion${progActivePortion}`];
  const acts=PMS_ACTS_5A.filter(a=>a.behind&&a.phase!=='commissioning');
  const is5b=progActivePortion==='5b';

  if(is5b){
    el.style.display='block';
    el.innerHTML=`<div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:14px;text-align:center">
      <div style="font-size:13px;color:var(--color-text-secondary);font-style:italic">Portion 5B has not started yet. Planned start: ${p.start}</div>
    </div>`;
    return;
  }

  const phaseRows=Object.entries(p.phases).map(([key,ph])=>{
    const phActs=acts.filter(a=>a.phase===key);
    const isOpen=!!progPhaseOpen[key];
    const behind=phActs.length;
    return `
    <div style="border-bottom:0.5px solid var(--color-border-tertiary)">
      <div onclick="togglePhase('${key}')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:${isOpen?'#eff6ff':'#fff'};transition:background .15s">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${ph.label}</span>
            ${behind>0?`<span style="font-size:11px;padding:2px 6px;border-radius:var(--border-radius-md);background:#FCEBEB;color:#A32D2D;font-weight:500">${behind} behind</span>`:'<span style="font-size:11px;padding:2px 6px;border-radius:var(--border-radius-md);background:#EAF3DE;color:#3B6D11">On track</span>'}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:11px;color:var(--color-text-secondary)">Plan <strong style="color:#185FA5">${ph.plan}%</strong></span>
            <span style="font-size:11px;color:var(--color-text-secondary)">Actual <strong style="color:#3B6D11">${ph.actual}%</strong></span>
            ${varBadge(ph.var,true)}
          </div>
        </div>
        <div style="width:90px">
          <div style="height:4px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden;margin-bottom:3px"><div style="height:100%;width:${Math.min(ph.plan,100)}%;background:#185FA5;border-radius:2px"></div></div>
          <div style="height:4px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.min(ph.actual,100)}%;background:#3B6D11;border-radius:2px"></div></div>
        </div>
        <span style="font-size:13px;color:var(--color-text-secondary);width:16px;text-align:center">${isOpen?'▲':'▼'}</span>
      </div>
      ${isOpen?renderPhaseTable(phActs):''}

  }).join('');

  el.innerHTML=`<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:14px">

    <td style="font-size:12px;padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)">${a.name}</td>

    <td style="font-size:12px;padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary);text-align:center;color:var(--color-text-secondary)">${a.weight}%</td>
    <td style="font-size:12px;padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary);text-align:center;font-weight:600;color:#A32D2D">${a.var_w}%</td>

      <th style="font-size:10px;font-weight:600;color:var(--color-text-secondary);padding:5px 8px;text-align:left;border-bottom:0.5px solid var(--color-border-secondary);text-transform:uppercase;letter-spacing:.04em">Description</th>
      <th style="font-size:10px;font-weight:600;color:var(--color-text-secondary);padding:5px 8px;text-align:center;border-bottom:0.5px solid var(--color-border-secondary);text-transform:uppercase;letter-spacing:.04em">Plan%</th>

function togglePhase(key){
  progPhaseOpen[key]=!progPhaseOpen[key];
  renderPortionDetail();
}

function renderProgActivities(){
  const el=document.getElementById('prog-acts-section');

    el.innerHTML=`<div style="text-align:center;padding:1rem;font-size:12px;color:var(--color-text-secondary);font-style:italic">Select a portion above to see phase details and activities.</div>`;
  }
}

function renderSCurve(mode){
  const canvas=document.getElementById('prog-scurve');
  if(!canvas)return;
  if(progChartInst){progChartInst.destroy();progChartInst=null;}

  const lbl=document.getElementById('scurve-lbl');

  if(mode==='5b'){
    if(lbl){lbl.textContent='S-Curve — Portion 5B (Not started — no data)';lbl.style.color='var(--color-text-secondary)';}
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.font='13px sans-serif';ctx.fillStyle='#aaa';ctx.textAlign='center';
    ctx.fillText('Portion 5B has not started. No data available.',canvas.width/2,90);
    return;
  }

  if(lbl){
    lbl.textContent = mode==='overall'?'S-Curve — Overall Project (Cumulative %)':'S-Curve — Portion 5A (Cumulative %)';
    lbl.style.color='var(--color-text-primary)';
  }

  // overall: scale actuals proportionally, keep planned from 5A shape
  const scale = (mode==='overall') ? (PMS_DATA.overall.actual / PMS_DATA.portion5a.actual) : 1;
  const planScale = (mode==='overall') ? (PMS_DATA.overall.plan / PMS_DATA.portion5a.plan) : 1;

  function r1(v){return Math.round(v*10)/10;}

  // Plan: always show for ALL weeks (past + future)
  const labels    = SCURVE_5A.map(d=>d.date);
  const planData  = SCURVE_5A.map(d=>r1(d.plan * planScale));        // never null
  const actData   = SCURVE_5A.map(d=>d.actual!==null?r1(d.actual*scale):null);
  const wkPlanData= SCURVE_5A.map(d=>d.wp!==null?r1(d.wp*planScale):null);
  const wkActData = SCURVE_5A.map(d=>d.wa!==null?r1(d.wa*scale):null);

  // Dynamic y-axis range
  const allVals = [...planData, ...actData.filter(v=>v!==null)];
  const yMin = Math.floor(Math.min(...allVals)/5)*5 - 2;
  const yMax = Math.ceil(Math.max(...allVals)/5)*5 + 3;

  const build=()=>{
    const c=document.getElementById('prog-scurve');if(!c)return;
    progChartInst=new Chart(c,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {type:'line',label:'Cum. Planned',data:planData,borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,.06)',fill:true,tension:0.3,pointRadius:5,pointHoverRadius:7,pointBackgroundColor:'#185FA5',pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5,yAxisID:'y',order:1},
          {type:'line',label:'Cum. Actual', data:actData, borderColor:'#3B6D11',backgroundColor:'rgba(59,109,17,.08)',fill:false,tension:0.3,pointRadius:5,pointHoverRadius:7,pointBackgroundColor:'#3B6D11',pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5,yAxisID:'y',order:2,spanGaps:false},
          {type:'bar',  label:'Weekly Plan',  data:wkPlanData,backgroundColor:'rgba(24,95,165,.35)',yAxisID:'y2',order:3,barPercentage:0.7,categoryPercentage:0.6},
          {type:'bar',  label:'Weekly Actual',data:wkActData, backgroundColor:'rgba(59,109,17,.45)',yAxisID:'y2',order:4,barPercentage:0.7,categoryPercentage:0.6},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'top',labels:{font:{size:11},usePointStyle:true,pointStyleWidth:10,boxWidth:10,padding:12}},
          tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>ctx.raw!=null?`${ctx.dataset.label}: ${ctx.raw}%`:null,filter:item=>item.raw!==null}}
        },
        scales:{
          y:{position:'left',min:yMin,max:yMax,ticks:{callback:v=>v+'%',font:{size:10},maxTicksLimit:7},grid:{color:'rgba(128,128,128,.1)'},title:{display:true,text:'Cumulative %',font:{size:10},color:'#6c757d'}},
          y2:{position:'right',min:0,max:10,ticks:{callback:v=>v+'%',font:{size:10},maxTicksLimit:6},grid:{display:false},title:{display:true,text:'Weekly %',font:{size:10},color:'#6c757d'}},
          x:{ticks:{font:{size:10},maxRotation:30,minRotation:0},grid:{display:false}}
        }
      }
    });
  };
  if(typeof Chart==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
    s.onload=build;document.head.appendChild(s);
  } else { build(); }
}

function getTodayStr(){
  const d = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return String(d.getDate()).padStart(2,'0') + '-' + months[d.getMonth()] + '-' + String(d.getFullYear()).slice(2);
}

function getNearestDate(target){
  // Find exact match or nearest date in LINER_DATES
  if(LINER_DATES.includes(target)) return target;
  // Parse and find closest
  function parseD(s){
    const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const p=s.split('-');
    return new Date(2000+parseInt(p[2]), months[p[1]], parseInt(p[0]));
  }
  const tDate = parseD(target);
  let best = LINER_DATES[0], bestDiff = Infinity;
  for(const d of LINER_DATES){
    const diff = Math.abs(parseD(d) - tDate);
    if(diff < bestDiff){ bestDiff = diff; best = d; }
  }
  return best;
}

function getPlanAt(item, date){
  // Sum all non-zero daily values up to and including selected date
  function parseD(s){
    const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const p=s.split('-');
    return new Date(2000+parseInt(p[2]),months[p[1]],parseInt(p[0]));
  }
  const tDate = parseD(date);
  let total = 0;
  for(const [d,v] of Object.entries(item.daily)){
    if(parseD(d) <= tDate) total += v;
  }
  return Math.round(total * 10) / 10;
}

function toDateInputVal(s){
  const months={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const p=s.split('-');
  if(p.length!==3)return '';
  return `20${p[2]}-${months[p[1]]||'01'}-${p[0].padStart(2,'0')}`;
}

function fromDateInputVal(s){
  if(!s)return '';
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const p=s.split('-');
  if(p.length!==3)return s;
  return `${p[2]}-${months[parseInt(p[1])-1]}-${p[0].slice(2)}`;
}

function round1(v){ return Math.round(v*10)/10; }

function linerCalcRow(id){
  const inp = document.getElementById('la-'+id);
  if(!inp) return;
  const actual = parseFloat(inp.value);
  const item = LINER_ITEMS.find(x=>x.id===id);
  if(!item) return;
  const plan = getPlanAt(item, linerDate);
  const variance = isNaN(actual) ? null : round1(actual - plan);
  // Live update variance cell
  const row = inp.closest('tr');
  if(row){
    const varCell = row.cells[5];
    if(varCell){
      const v = variance;
      varCell.textContent = v===null?'—':(v>=0?'+':'')+v.toLocaleString();
      varCell.style.color = v===null?'var(--text2)':v>=0?'#15803d':'#b91c1c';
    }
  }
}

function saveLinerRow(id){
  const inp = document.getElementById('la-'+id);
  if(!inp) return;
  const val = parseFloat(inp.value);
  if(!isNaN(val)) linerActuals[id] = val;
  saveLinerData();
  const li=LINER_ITEMS.find(x=>x.id===id);
  logActivity(`updated liner actual: "${li?li.name:'item'}"`);
  notify('Liner actual saved.');
  renderLiner();
}

function onLinerDateChange(val){
